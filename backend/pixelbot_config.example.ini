# Pixel Bot configuration (optional).
#
# Rename to pixelbot_config.ini and drop it next to PixelBot.exe — or in the
# project root when running from source. Anything you omit keeps its default.

[server]
# Preferred port. A nearby free port is picked if this one is taken.
port = 5000

# 0.0.0.0 binds every interface; 127.0.0.1 locks to localhost only.
host = 0.0.0.0

[monitoring]
# Seconds between pixel checks. 0.1 = 10 checks/sec.
# Lower = faster detection, more CPU. Higher = less CPU, slower detection.
check_interval = 0.1

# Default colour tolerance for new monitors (0–255). Higher = more lenient.
default_tolerance = 10

# Default cooldown for new monitors, in milliseconds.
default_cooldown = 1000

[advanced]
# DEBUG / INFO / WARNING / ERROR
log_level = INFO

# Seconds before the desktop pixel picker gives up.
picker_timeout = 30

