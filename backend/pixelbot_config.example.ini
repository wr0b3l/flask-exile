# Pixel Bot Configuration
# 
# This file allows you to customize Pixel Bot settings.
# Most users won't need to change these values.
#
# To use: Rename this file to 'pixelbot_config.ini' and place it next to PixelBot.exe

[server]
# Server port (default: 5000)
# If port is in use, a free port will be automatically selected
port = 5000

# Server host (default: 0.0.0.0 = all interfaces)
# Change to 127.0.0.1 for localhost only
host = 0.0.0.0

[monitoring]
# Check interval in seconds (default: 0.1 = 10 checks per second)
# Lower = faster detection but more CPU usage
# Higher = slower detection but less CPU usage
check_interval = 0.1

# Default pixel color tolerance (0-255)
# Higher = more lenient color matching
default_tolerance = 10

# Default action cooldown in milliseconds
# Prevents rapid-fire key presses
default_cooldown = 1000

[advanced]
# Log level: DEBUG, INFO, WARNING, ERROR
log_level = INFO

# Pixel picker timeout in seconds
picker_timeout = 30

# Auto-open browser on startup (true/false)
auto_open_browser = true

